name: snowflake-devops-demo

on:
  push:
    branches: [ main ]
    paths:
      - "Demo_snowflake/migrations/**"
      - "Demo_snowflake/config/**"
      - ".github/workflows/snowflake-devops.yml"
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment config name (dev/uat/prod)"
        required: true
        default: "dev"

jobs:
  deploy-snowflake-changes:
    runs-on: ubuntu-latest

    env:
      # Select environment: default dev for push, or workflow_dispatch input for manual run
      ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.env || 'dev' }}

      # ✅ Connection settings from GitHub Variables (non-secret)
      SNOWFLAKE_ACCOUNT:   ${{ vars.SF_ACCOUNT }}
      SNOWFLAKE_USER:      ${{ vars.SF_USER }}
      SNOWFLAKE_ROLE:      ${{ vars.SF_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ vars.SF_WAREHOUSE }}
      SNOWFLAKE_DATABASE:  ${{ vars.SF_DATABASE }}

      # ✅ Password/token from GitHub Secrets (secret)
      SNOWFLAKE_PASSWORD:  ${{ secrets.SF_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install schemachange
        run: |
          python --version
          pip install --upgrade schemachange

      - name: Validate folders + config file exist
        run: |
          echo "Repo root:"
          pwd
          echo "ENV=${ENV}"

          echo "Listing Demo_snowflake:"
          ls -la Demo_snowflake || true

          echo "Listing config:"
          ls -la Demo_snowflake/config || true

          echo "Listing migrations:"
          ls -la Demo_snowflake/migrations || true

          test -f "Demo_snowflake/config/${ENV}.yml" || (echo "Missing Demo_snowflake/config/${ENV}.yml" && exit 1)

      - name: Sanity check required env vars (non-secret only)
        run: |
          echo "SNOWFLAKE_ACCOUNT=${SNOWFLAKE_ACCOUNT}"
          echo "SNOWFLAKE_USER=${SNOWFLAKE_USER}"
          echo "SNOWFLAKE_ROLE=${SNOWFLAKE_ROLE}"
          echo "SNOWFLAKE_WAREHOUSE=${SNOWFLAKE_WAREHOUSE}"
          echo "SNOWFLAKE_DATABASE=${SNOWFLAKE_DATABASE}"

          if [ -z "$SNOWFLAKE_USER" ]; then
            echo "ERROR: SNOWFLAKE_USER is empty. Set vars.SNOWFLAKE_USER in GitHub Variables."
            exit 1
          fi

      - name: (Optional) Verify connection
        run: |
          schemachange verify -f Demo_snowflake/migrations

      - name: Deploy via schemachange
        run: |
          schemachange deploy \
            -f Demo_snowflake/migrations \
            --config-folder Demo_snowflake/config \
            --config-file-name "${ENV}.yml" \
            --create-change-history-table
