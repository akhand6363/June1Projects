name: snowflake-devops-demo

on:
  push:
    branches: [ main ]
    paths:
      - "Demo_snowflake/migrations/**"
      - "Demo_snowflake/config/**"
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment (dev/uat/prod) -> selects Demo_snowflake/config/<env>.yml"
        required: true
        default: "dev"

jobs:
  deploy-snowflake-changes:
    runs-on: ubuntu-latest

    env:
      ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.env || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install schemachange + yaml parser
        run: |
          python --version
          pip install --upgrade schemachange pyyaml

      - name: Debug - show folders
        run: |
          pwd
          ls -la
          ls -la Demo_snowflake || true
          ls -la Demo_snowflake/config || true
          ls -la Demo_snowflake/migrations || true

      - name: Validate config exists
        run: |
          test -f "Demo_snowflake/config/${ENV}.yml" || (echo "Missing Demo_snowflake/config/${ENV}.yml" && exit 1)

      - name: Export SNOWFLAKE_* values from config (non-secrets)
        run: |
          python - <<'PY'
          import os, yaml
          env = os.environ["ENV"]
          path = f"Demo_snowflake/config/{env}.yml"
          with open(path, "r") as f:
              cfg = yaml.safe_load(f) or {}

          keys = ["SNOWFLAKE_ACCOUNT","SNOWFLAKE_USER","SNOWFLAKE_ROLE","SNOWFLAKE_WAREHOUSE","SNOWFLAKE_DATABASE"]
          with open(os.environ["GITHUB_ENV"], "a") as out:
              for k in keys:
                  v = cfg.get(k)
                  if v is not None and str(v).strip():
                      out.write(f"{k}={v}\n")
          PY

      - name: Run schemachange deploy
        env:
          # Keep password protected (schemachange CI/CD guidance prefers env vars for secrets) [4](https://www.youtube.com/watch?v=nK7PZOrPqkA)[5](https://pypi.org/project/db-schemachange/)
          SNOWFLAKE_PASSWORD: ${{ secrets.SF_PASSWORD }}
        run: |
          schemachange deploy \
            -f Demo_snowflake/migrations \
            --config-folder Demo_snowflake/config \
            --config-file-name "${ENV}.yml" \
            --create-change-history-table
